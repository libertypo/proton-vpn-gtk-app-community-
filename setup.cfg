[flake8]
max-line-length = 100
per-file-ignores =
    integration_tests/features/steps/*.py: F811
    tests/unit/*: E501

[tool:pytest]
addopts = --cov=proton --cov-report=html --cov-report=term
filterwarnings =
    ignore:GLib.unix_signal_add_full is deprecated; use GLibUnix.signal_add_full instead:gi.PyGIDeprecationWarning
    ignore:'asyncio.AbstractEventLoopPolicy' is deprecated and slated for removal in Python 3.16:DeprecationWarning:gi.events
    ignore:'asyncio.get_event_loop_policy' is deprecated and slated for removal in Python 3.16:DeprecationWarning:gi.events
testpaths =
    tests/unit

[mypy]
ignore_missing_imports = True
explicit_package_bases = True

# GInterface MRO false positives — known pygobject-stubs bug (not real code issues)
[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.connection_settings]
disable_error_code = misc

# GInterface MRO false positives — known pygobject-stubs bug
[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.kill_switch]
disable_error_code = misc, union-attr

# Both GInterface MRO (misc) and union-attr from ComboboxWidget|None (stubs gap)
[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.feature_settings]
disable_error_code = misc, union-attr

# GInterface MRO false positives — known pygobject-stubs bug
[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.split_tunneling.split_tunneling]
disable_error_code = misc, union-attr

# Pattern B union-attr: proton.vpn packages have no stubs, causing Any|None cascade
[mypy-proton.vpn.app.gtk.conflicts]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.controller]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.custom_dns]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.split_tunneling.app.data_structures]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.widgets.vpn.vpn_widget]
disable_error_code = union-attr, return-value

[mypy-proton.vpn.app.gtk.widgets.vpn.search_results]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.widgets.vpn.port_forward_widget]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.utils.exception_handler]
disable_error_code = union-attr

[mypy-proton.vpn.app.gtk.app]
disable_error_code = union-attr, return-value

[mypy-proton.vpn.app.gtk.widgets.headerbar.menu.settings.early_access]
disable_error_code = return-value

[mypy-proton.vpn.app.gtk.widgets.login.two_factor_auth.authenticator_app_form]
disable_error_code = return-value

[mypy-proton.vpn.app.gtk.widgets.main.pull_notifications.nps_survey_modal]
disable_error_code = return-value

